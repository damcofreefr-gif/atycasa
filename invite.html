<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#16130F">
  <meta name="robots" content="noindex, nofollow">
  <title>Atycasa — Accès</title>
  <style>
    :root {
      --bg1: #16130F;
      --bg2: #221C15;
      --text: #EAF4F0;
      --accent: #5BE3A9;
      --border: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
      padding: 24px;
      text-align: center;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 13px; color: rgba(234,244,240,0.6); margin: 0 0 24px; max-width: 280px; line-height: 1.5; }
    form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
    input {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; color: var(--text); font-size: 16px; text-align: center;
      font-family: inherit;
    }
    input::placeholder { color: rgba(234,244,240,0.35); }
    button {
      background: var(--accent); color: var(--bg1); border: none; border-radius: 10px;
      padding: 12px; font-weight: 700; font-size: 14px; cursor: pointer;
      font-family: inherit;
    }
    .err { color: #E88; font-size: 12px; margin-top: 4px; display: none; }
  </style>
</head>
<body>

  <h1>🔒 Atycasa</h1>
  <p>Cette appli est réservée aux personnes invitées. Entre ton code d'accès.</p>

  <form id="f">
    <input id="code" type="text" placeholder="Code d'accès" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <button type="submit">Entrer</button>
    <span class="err" id="err">Code invalide.</span>
  </form>

  <script>
    var params = new URLSearchParams(location.search);
    if (params.get('invalid') === '1') {
      document.getElementById('err').style.display = 'block';
    }
    document.getElementById('f').addEventListener('submit', function (e) {
      e.preventDefault();
      var code = document.getElementById('code').value.trim();
      if (!code) return;
      location.href = '/?invite=' + encodeURIComponent(code);
    });
  </script>

</body>
</html>
